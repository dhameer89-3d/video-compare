<body>


<div class="container compare">

    <video class="base-video beforeVideo"
        autoplay muted loop playsinline>
        <source src="before.mp4" type="video/mp4">
    </video>


    <div class="overlay">

        <video class="overlay-video afterVideo"
            autoplay muted loop playsinline>
            <source src="after.mp4" type="video/mp4">
        </video>

    </div>


    <div class="before-label">DETAILING LV 1</div>
    <div class="after-label">DETAILING LV 2</div>

    <div class="slider-line"></div>
    <div class="slider-handle"></div>

</div>




<div class="container compare">

    <video class="base-video beforeVideo"
        autoplay muted loop playsinline>
        <source src="before2.mp4" type="video/mp4">
    </video>


    <div class="overlay">

        <video class="overlay-video afterVideo"
            autoplay muted loop playsinline>
            <source src="after2.mp4" type="video/mp4">
        </video>

    </div>


    <div class="before-label">DETAILING LV 1</div>
    <div class="after-label">DETAILING LV 2</div>

    <div class="slider-line"></div>
    <div class="slider-handle"></div>

</div>




<div class="footer">

    Dhameer Abbas • 3D Artist

    <br>

    <a href="mailto:dhameer89@gmail.com">
        dhameer89@gmail.com
    </a>

</div>




<script>


document.querySelectorAll(".compare").forEach(compare=>{


const overlay =
compare.querySelector('.overlay');


const line =
compare.querySelector('.slider-line');


const handle =
compare.querySelector('.slider-handle');


const before =
compare.querySelector('.beforeVideo');


const after =
compare.querySelector('.afterVideo');



let dragging=false;



function updateSlider(clientX){


    const rect =
    compare.getBoundingClientRect();


    let x =
    clientX - rect.left;


    x =
    Math.max(0,Math.min(x,rect.width));


    const percent =
    (x/rect.width)*100;



    overlay.style.clipPath =
    `inset(0 ${100-percent}% 0 0)`;


    line.style.left =
    percent+'%';


    handle.style.left =
    percent+'%';

}



compare.addEventListener('mousedown',e=>{

    dragging=true;

    updateSlider(e.clientX);

});



window.addEventListener('mousemove',e=>{


    if(dragging){

        updateSlider(e.clientX);

    }


});



window.addEventListener('mouseup',()=>{

    dragging=false;

});



compare.addEventListener('touchstart',e=>{

    updateSlider(e.touches[0].clientX);

});



compare.addEventListener('touchmove',e=>{

    updateSlider(e.touches[0].clientX);

});





setInterval(()=>{


    if(
    Math.abs(
    before.currentTime-after.currentTime
    )>0.05
    ){

        after.currentTime=
        before.currentTime;

    }


},100);



});


</script>


</body>
